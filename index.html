<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<title>Bắp Bơ Family</title>

<style>

body{
font-family:Arial;
background:#f4f7fb;
padding:40px;
text-align:center;
}

.box{
background:white;
max-width:800px;
margin:auto;
padding:40px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

</style>

</head>

<body>

<div class="box">

<h1>📚 Bắp Bơ Family</h1>

<h2>Cùng 2 bé vui học mỗi ngày</h2>

<p>Chọn lớp học</p>

<button>Lớp 1</button>
<button>Lớp 2</button>
<button>Lớp 3</button>
<button>Lớp 4</button>
<button>Lớp 5</button>

</div>

</body>

</html>
