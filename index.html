<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<title>Bắp Bơ Family</title>

<style>

body{
background:#f4f7fb;
font-family:Arial;
text-align:center;
padding:40px;
}

.box{
background:white;
padding:30px;
border-radius:20px;
width:700px;
margin:auto;
box-shadow:0 0 15px rgba(0,0,0,0.1);
}

button{
padding:12px 20px;
margin:8px;
border:none;
border-radius:10px;
background:#4F46E5;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#4338CA;
}

</style>

</head>

<body>

<div class="box">

<h1>📚 Bắp Bơ Family</h1>

<h2>Cùng 2 bé vui học mỗi ngày</h2>

<p>Chọn lớp học</p>

<button>Lớp 1</button>
<button>Lớp 2</button>
<button>Lớp 3</button>
<button>Lớp 4</button>
<button>Lớp 5</button>

</div>

</body>

</html>
