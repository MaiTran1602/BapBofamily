<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bắp Bơ Family</title>

<style>

body{
font-family:Arial;
background:#f4f7fb;
padding:40px;
text-align:center;
}

.box{
background:white;
max-width:800px;
margin:auto;
padding:40px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

</style>

</head>

<body>

<div class="box">

<h1>📚 Bắp Bơ Family</h1>

<h2>Cùng 2 bé vui học mỗi ngày</h2>

<p>Chọn lớp học</p>

<button onclick="chonLop(1)">Lớp 1</button>
<button onclick="chonLop(2)">Lớp 2</button>
<button onclick="chonLop(3)">Lớp 3</button>
<button onclick="chonLop(4)">Lớp 4</button>
<button onclick="chonLop(5)">Lớp 5</button>

<div id="monhoc"></div>

</div>

<script>

function chonLop(lop){

document.getElementById("monhoc").innerHTML =

"<h3>Chọn môn học lớp "+lop+"</h3>"+

"<button onclick='chonMon()'>Toán</button>"+

"<button>Tiếng Việt</button>"+

"<button>Tiếng Anh</button>"+

"<div id='dethi'></div>";

}
  function chonMon(){

document.getElementById("dethi").innerHTML =

"<h3>Chọn đề</h3>"+

"<button onclick='lamBai()'>Cộng trừ phạm vi 10</button>"+

"<button>Cộng trừ phạm vi 20</button>"+

"<button>So sánh số</button>";

}
  function lamBai(){

document.getElementById("dethi").innerHTML = `

<h3>Câu 1</h3>

<p>5 + 3 = ?</p>

<button onclick="dung()">8</button>

<button onclick="sai()">7</button>

<button onclick="sai()">6</button>

<button onclick="sai()">9</button>

`;

}

function dung(){

alert("Chính xác 🎉");

}

function sai(){

alert("Chưa đúng");

}

</script>

</body>
</html>
